# configs/training/multivit_fusion_lite_fdg.yaml
# Lightweight MultiViT for faster iteration and hyperparameter search

model:
  name: multivit_fusion_lite
  num_classes: 3
  embed_dim: 128        # Smaller embedding
  num_heads: 4
  encoder_depth: 1      # Fewer layers
  fusion_depth: 1
  mlp_ratio: 2.0        # Smaller MLP
  dropout: 0.15
  base_filters: 24      # Smaller CNN encoder

training:
  batch_size: 8         # Can fit larger batch with smaller model
  epochs: 100           # Fewer epochs for quick test
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 2
  pin_memory: true
  
  optimizer:
    name: adamw
    lr: 3e-4
    weight_decay: 0.05
    patience: 10
  
  scheduler:
    name: CosineAnnealingLR
    t_max: 100
    lr_min: 1e-6

data:
  mode: fusion
  mri_col: mri_preproc
  pet_col: pet_preproc
  group_col: subject_id
  trainval_csv: "/project/aereditato/abhat/adni-mri-classification/data/preprocessing_dicom_spm_2/pipeline_v2/trainval_fdg.csv"
  test_csv: "/project/aereditato/abhat/adni-mri-classification/data/preprocessing_dicom_spm_2/pipeline_v2/test_fdg.csv"
  
  augmentation:
    random_flip:
      p: 0.5
    random_affine:
      p: 0.3
      degrees: 5
      translation: 5
    random_noise:
      p: 0.2
      std: 0.02
  
  oversample: false

cross_validation:
  method: kfold
  folds: 5
  seed: 42